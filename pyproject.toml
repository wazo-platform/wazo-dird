[tool.black]
skip-string-normalization = true

[tool.flake8]
show-source = true
max-line-length = 99
application-import-names = "wazo_dird"
exclude = [
    "build",
    ".tox",
    ".eggs",
    "integration_tests/assets/scripts"
]

ignore = [
    "E203", # whitespace before ':' warnings
    "E501", # line too long
    "W503", # line break before binary operator
]

[tool.isort]
profile = "black"
py_version = 311

[tool.pytest]
testpaths = ["wazo_dird"]

[tool.mypy]
python_version = "3.11"
strict = true

show_error_codes = true
no_warn_no_return = true      # NOT in strict; strict would leave warn_no_return on
scripts_are_modules = true

explicit_package_bases = true

exclude_gitignore = true

# Exclude the broken-plugins fixture's setup.py: it shares the module name
# "setup" with the root setup.py and causes a Duplicate module error
exclude = [
    "integration_tests/docker/broken-plugins/setup\\.py$",
]

# TODO: remove when py.typed markers are added to those libraries
[[tool.mypy.overrides]]
module = [
    "wazo_auth_client",
    "wazo_confd_client",
]
ignore_missing_imports = true
