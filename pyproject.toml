[tool.black]
skip-string-normalization = true

[tool.flake8]
show-source = true
max-line-length = 99
application-import-names = "wazo_dird"
exclude = [
    "build",
    ".tox",
    ".eggs",
    "integration_tests/assets/scripts"
]

ignore = [
    "E203", # whitespace before ':' warnings
    "E501", # line too long
    "W503", # line break before binary operator
]

[tool.isort]
profile = "black"
py_version = 311

[tool.pytest]
testpaths = ["wazo_dird"]

[tool.mypy]
python_version = "3.11"
show_error_codes = true
check_untyped_defs = true
warn_unused_configs = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
strict_equality = true
extra_checks = true
no_warn_no_return = true
scripts_are_modules = true

# Exclude the broken-plugins fixture's setup.py: it shares the module name
# "setup" with the root setup.py and causes a Duplicate module error
exclude = [
    "integration_tests/docker/broken-plugins/setup\\.py$",
]

explicit_package_bases = true
[[tool.mypy.overrides]]
module = [
    "*.tests.*",
    "integration_tests.suite.*",
]
disallow_untyped_defs = false
disallow_untyped_calls = false

# TODO: remove when py.typed markers are added to those libraries
[[tool.mypy.overrides]]
module = [
    "wazo_auth_client",
    "wazo_confd_client",
]
ignore_missing_imports = true
