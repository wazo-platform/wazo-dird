[tox]
env_list = py311, linters
no_package = false

[testenv]
base_python = python3.11
set_env =
    SQLALCHEMY_WARN_20=1
commands =
    pytest --junitxml=unit-tests.xml --cov=wazo_dird --cov-report term --cov-report xml:coverage.xml wazo_dird
deps =
    -rrequirements.txt
    -rtest-requirements.txt
    pytest-cov

[testenv:black]
skip_install = true
deps =
    pre-commit
commands = pre-commit run black --all-files

[testenv:linters]
skip_install = true
deps = pre-commit
commands = pre-commit run --all-files

[testenv:integration]
use_develop = true
deps = -rintegration_tests/test-requirements-for-tox.txt
change_dir = integration_tests
pass_env =
    INTEGRATION_TEST_TIMEOUT
    TEST_LOGS
    WAZO_TEST_DOCKER_LOGS_DIR
    WAZO_TEST_DOCKER_LOGS_ENABLED
    WAZO_TEST_DOCKER_OVERRIDE_EXTRA
    WAZO_TEST_NO_DOCKER_COMPOSE_PULL
set_env =
    SQLALCHEMY_WARN_20=1
commands =
    make test-setup
    pytest {posargs:suite/}
allowlist_externals =
    make

[testenv:performance]
base_python = python3.11
use_develop = true
deps = -rintegration_tests/test-requirements-for-tox.txt
change_dir = integration_tests
pass_env =
    INTEGRATION_TEST_TIMEOUT
    TEST_LOGS
    WAZO_TEST_DOCKER_LOGS_DIR
    WAZO_TEST_DOCKER_LOGS_ENABLED
    WAZO_TEST_DOCKER_OVERRIDE_EXTRA
    WAZO_TEST_NO_DOCKER_COMPOSE_PULL
set_env =
    SQLALCHEMY_WARN_20=1
commands =
    make test-setup
    pytest -s {posargs:performance_suite/}
allowlist_externals =
    make

[testenv:explain]
base_python = python3.11
use_develop = true
deps = -rintegration_tests/test-requirements-for-tox.txt
change_dir = integration_tests
pass_env =
    INTEGRATION_TEST_TIMEOUT
    WAZO_TEST_NO_DOCKER_COMPOSE_PULL
set_env =
    SQLALCHEMY_WARN_20=1
    WAZO_TEST_DOCKER_OVERRIDE_EXTRA={toxinidir}/integration_tests/assets/docker-compose.explain.override.yml
    WAZO_TEST_DOCKER_LOGS_ENABLED=1
    WAZO_TEST_DOCKER_LOGS_DIR={toxinidir}/integration_tests/explain-logs
commands =
    make test-setup
    pytest -s {posargs:performance_suite/}
allowlist_externals =
    make

[testenv:load]
skip_install = true
deps = -rcontribs/stress_tests/requirements.txt
change_dir = contribs/stress_tests
pass_env =
    WAZO_LOGIN
    WAZO_PASSWORD
    WAZO_TENANT
    WAZO_HOST
    WAZO_AUTH_HOST
    WAZO_PROFILE
    NUMBER_BASE
    MOBILE_BASE
    PHONEBOOK_COUNT
    P95_THRESHOLD_MS
    FAIL_RATIO_PCT
commands =
    locust -f locustfile.py -H {env:WAZO_HOST:http://localhost:9489} {posargs}
